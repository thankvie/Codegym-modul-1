<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Câu 3 - Đếm cặp số</title>
</head>
<body>
    <h2>Câu 3: Đếm cặp số có tổng chia hết cho k</h2>
    
    <label>Nhập số:</label>
    <input type="number" id="so">
    <button onclick="themVaoMang()">Thêm vào mảng</button>
    
    <p>Mảng: <span id="hienThiMang"></span></p>
    <p>Số phần tử: <span id="soPhanTu">0</span>/50</p>
    
    <hr>
    
    <label>Nhập số nguyên dương k:</label>
    <input type="number" id="k">
    <button onclick="demCapSo()">Đếm cặp số</button>
    
    <p>Số cặp thỏa mãn: <b><span id="ketQua"></span></b></p>
    <p>Các cặp: <span id="danhSachCap"></span></p>

    <script>
        var mang = [];
        
        function themVaoMang() {
            if (mang.length >= 50) {
                alert("Mảng đã có 50 phần tử, không thể thêm nữa!");
                return;
            }
            
            var so = document.getElementById("so").value;
            
            if (so === "") {
                alert("Vui lòng nhập một số!");
                return;
            }
            
            mang.push(parseInt(so));
            document.getElementById("so").value = "";
            document.getElementById("hienThiMang").innerHTML = mang.join(", ");
            document.getElementById("soPhanTu").innerHTML = mang.length;
        }
        
        function demCapSo() {
            var k = parseInt(document.getElementById("k").value);
            
            // Kiểm tra k là số nguyên dương
            if (!k || k <= 0) {
                alert("Vui lòng nhập số nguyên dương k!");
                return;
            }
            
            // Đếm các cặp có tổng chia hết cho k
            var dem = 0;
            var danhSach = [];
            
            for (var i = 0; i < mang.length; i++) {
                for (var j = i + 1; j < mang.length; j++) {
                    if ((mang[i] + mang[j]) % k === 0) {
                        dem++;
                        danhSach.push("(" + mang[i] + ", " + mang[j] + ")");
                    }
                }
            }
            
            // Hiển thị kết quả
            document.getElementById("ketQua").innerHTML = dem + " cặp";
            document.getElementById("danhSachCap").innerHTML = danhSach.join(", ");
        }
    </script>
</body>
</html>
