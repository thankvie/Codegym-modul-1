<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Câu 1</title>
</head>
<body>
    <h2>Câu 1: Tìm bội chung của 3 và 5</h2>
    
    <label>Nhập số:</label>
    <input type="number" id="so">
    <button onclick="themVaoMang()">Thêm vào mảng</button>
    
    <p>Mảng số nguyên: <span id="hienThiMang"></span></p>
    <p>Số phần tử: <span id="soPhanTu">0</span>/20</p>

    <script>
        var mangSoNguyen = [];
        
        function themVaoMang() {
            // Kiểm tra không quá 20 phần tử
            if (mangSoNguyen.length >= 20) {
                alert("Mảng đã có 20 phần tử, không thể thêm nữa!");
                return;
            }
            
            var so = document.getElementById("so").value;
            
            // Kiểm tra rỗng
            if (so === "") {
                alert("Vui lòng nhập một số!");
                return;
            }
            
            mangSoNguyen.push(parseInt(so));
            document.getElementById("so").value = "";
            
            document.getElementById("hienThiMang").innerHTML = mangSoNguyen.join(", ");
            document.getElementById("soPhanTu").innerHTML = mangSoNguyen.length;
        }
    </script>
</body>
</html>
