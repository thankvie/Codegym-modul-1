<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Câu 2 - Làm tròn điểm</title>
</head>
<body>
    <h2>Câu 2: Làm tròn điểm số</h2>

    <script>
        // Hàm làm tròn điểm theo quy tắc của thầy Trung
        function lamTronDiem(diem) {
            // Kiểm tra điểm trong khoảng 0-100
            if (diem < 0 || diem > 100) {
                return "Điểm không hợp lệ";
            }
            
            // Nếu điểm nhỏ hơn 48 thì không làm tròn
            if (diem < 48) {
                return diem;
            }
            
            // Tìm bội số tiếp theo của 5
            var boiSoTiepTheo = Math.ceil(diem / 5) * 5;
            
            // Tính khoảng cách
            var khoangCach = boiSoTiepTheo - diem;
            
            // Nếu khoảng cách nhỏ hơn 3 thì làm tròn lên
            if (khoangCach < 3) {
                return boiSoTiepTheo;
            } else {
                return diem;
            }
        }
    </script>
</body>
</html>
